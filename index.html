<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kar's calc</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="calculator">
        <input id="display">
        <div id="keys">
                <button onclick="ClearAll()" class="toprow">AC</button>
                <button onclick="Delete()" class="toprow">DE</button>
                <button onclick="appendToDisplay('.')" class="toprow">.</button>
                <button onclick="appendToDisplay('/')" class="toprow">/</button>
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('*')" class="toprow">*</button>
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('-')" class="toprow">-</button>
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('+')" class="toprow">+</button>
                <button onclick="appendToDisplay('00')" class="lastrow">00</button>
                <button onclick="appendToDisplay('0')" class="lastrow">0</button>
                <button onclick="calculate()" class="toprow equal lastrow">=</button>
        </div>
    </div>
